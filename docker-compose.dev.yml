services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediscala
      POSTGRES_PASSWORD: mediscala
      POSTGRES_DB: mediscala
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediscala"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
